<script>
(function () {
  'use strict';
  var SRC = 'telluric-resonant-mhd.md';
  var el = document.getElementById('doc');

  function fail(msg) {
    el.innerHTML = '<div class="error">' + msg +
      ' You can still <a href="' + SRC + '" download>download the markdown</a>.</div>';
  }

  fetch(SRC, { cache: 'no-cache' })
    .then(function (r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.text();
    })
    .then(function (md) {
      if (!window.marked) { fail('The renderer failed to load.'); return; }
      marked.setOptions({ gfm: true, breaks: false });
      el.innerHTML = marked.parse(md);
      // Set the document title from the first heading, if present.
      var h1 = el.querySelector('h1');
      if (h1) document.title = 'φCoherent · ' + h1.textContent.trim();
    })
    .catch(function (e) {
      fail('Could not load the whitepaper (' + e.message + ').');
    });
})();
</script>
