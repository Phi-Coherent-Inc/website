<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>φCoherent · Qudit Measurement-Based Computation (1D + 2D)</title>
<meta name="description" content="Interactive demo: measurement-based (one-way) quantum computation generalized to qudits (d-level systems). 1D: a qudit cluster resource state with an area law quantized in ln d and one-way J_d-chains computing any single-qudit unitary at fidelity 1. 2D: a real two-qudit algorithm run purely by measurement, with vertical CZ_d links making it genuinely entangling. Computed live in your browser via WebAssembly. No golden ratio.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://phicoherent.com/demos/qudit-mbqc.html">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<meta name="theme-color" content="#C9A830">
<script>try{if(localStorage.getItem('phi-theme')==='dark')document.documentElement.setAttribute('data-theme','dark');}catch(e){}</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,300;6..72,400;6..72,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/demo.css?v=20260622">
<style>
  .tabbar { display:flex; gap:8px; max-width:1180px; margin:20px auto 0; padding:0 24px; flex-wrap:wrap; }
  .tabbar .tab {
    padding:10px 20px; border:1px solid var(--gold-border); border-bottom:none;
    border-radius:10px 10px 0 0; background:var(--surface); color:var(--text-muted);
    font:600 14px Inter,sans-serif; cursor:pointer;
  }
  .tabbar .tab.active { background:var(--gold); color:#1C1810; border-color:var(--gold); }
  .tabbar .tab:focus-visible { outline:2px solid var(--gold); outline-offset:2px; }
  .tab-intro { max-width:1180px; margin:6px auto 0; padding:0 24px;
    font:400 13.5px/1.6 Inter,sans-serif; color:var(--text-muted); }
  .frame-wrap { max-width:1240px; margin:8px auto 40px; padding:0 24px; }
  .demo-frame { width:100%; border:1px solid var(--gold-border); border-radius:0 12px 12px 12px;
    background:var(--panel); display:block; }
  .frame-loading { padding:60px 0; text-align:center; color:var(--text-muted);
    font:400 14px Inter,sans-serif; }
</style>
</head>
<body>

<header class="demo-header" data-demo="qudit-mbqc"
        data-title="Qudit Measurement-Based Computation"></header>

<div class="tabbar" id="tabbar" role="tablist" aria-label="MBQC view">
  <button class="tab active" role="tab" data-src="qudit-mbqc-1d.html" data-label="1D · one-way computation">1D · one-way computation</button>
  <button class="tab" role="tab" data-src="qudit-mbqc-2d.html" data-label="2D · entangling cluster">2D · entangling cluster</button>
</div>
<p class="tab-intro" id="tabIntro">Measurement <em>is</em> the computation. <strong>1D:</strong> a qudit cluster resource state, area law quantized in ln d, and one-way J_d-chains computing any single-qudit unitary at fidelity 1.</p>
<div class="frame-wrap">
  <div id="frames"><div class="frame-loading" id="loading">Loading…</div></div>
</div>

<script src="assets/demo-header.js?v=20260622"></script>
<script>
// Unified host: lazy same-origin iframes of the two standalone MBQC demos
// (loaded with ?embed=1 so each hides its own chrome). Each is created on first
// visit and kept for instant re-switching; height auto-fits its content; the
// host theme toggle propagates into the embedded documents.
(function () {
  var frames = document.getElementById('frames');
  var loading = document.getElementById('loading');
  var intro = document.getElementById('tabIntro');
  var made = {};      // src -> iframe
  var introByLabel = {
    '1D · one-way computation': 'Measurement <em>is</em> the computation. <strong>1D:</strong> a qudit cluster resource state, area law quantized in ln d, and one-way J_d-chains computing any single-qudit unitary at fidelity 1.',
    '2D · entangling cluster': '<strong>2D:</strong> a real two-qudit algorithm run purely by measurement: vertical CZ_d links make it genuinely entangling; strip them and the cluster factorizes. Every branch draws a random byproduct correction, yet the corrected output is exact (fidelity 1.000).'
  };

  function fit(f) {
    try {
      var d = f.contentDocument;
      if (d && d.body) f.style.height = (d.body.scrollHeight + 24) + 'px';
    } catch (e) { /* same-origin expected; ignore */ }
  }

  function applyTheme(f) {
    try {
      var dark = document.documentElement.getAttribute('data-theme') === 'dark';
      var doc = f.contentDocument, win = f.contentWindow;
      if (dark) doc.documentElement.setAttribute('data-theme', 'dark');
      else doc.documentElement.removeAttribute('data-theme');
      if (win && win.PhiTheme && win.PhiTheme._fire) win.PhiTheme._fire();
      setTimeout(function () { fit(f); }, 60);
    } catch (e) { /* ignore */ }
  }

  function show(src) {
    Object.keys(made).forEach(function (s) { made[s].style.display = (s === src) ? 'block' : 'none'; });
    if (!made[src]) {
      var f = document.createElement('iframe');
      f.className = 'demo-frame';
      f.title = 'demo';
      f.style.height = '900px';
      f.src = src + '?embed=1';
      f.addEventListener('load', function () { applyTheme(f); fit(f); });
      made[src] = f;
      frames.appendChild(f);
    }
    if (loading) { loading.style.display = 'none'; }
  }

  document.querySelectorAll('#tabbar .tab').forEach(function (btn) {
    btn.addEventListener('click', function () {
      document.querySelectorAll('#tabbar .tab').forEach(function (b) {
        b.classList.toggle('active', b === btn);
        b.setAttribute('aria-selected', b === btn ? 'true' : 'false');
      });
      intro.innerHTML = introByLabel[btn.dataset.label] || '';
      show(btn.dataset.src);
    });
  });

  // re-fit the visible frame on resize; propagate theme toggles into all frames
  window.addEventListener('resize', function () {
    Object.keys(made).forEach(function (s) { if (made[s].style.display !== 'none') fit(made[s]); });
  });
  function onThemeChange() { Object.keys(made).forEach(function (s) { applyTheme(made[s]); }); }
  if (window.PhiTheme && window.PhiTheme.onChange) window.PhiTheme.onChange(onThemeChange);

  show('qudit-mbqc-1d.html');   // default tab
})();
</script>
</body>
</html>
