<body>

<header class="demo-header" data-demo="fibonacci-anyons"
        data-title="Fibonacci Anyons: Braiding &amp; Universality"></header>

<div class="tabbar" id="tabbar" role="tablist" aria-label="Fibonacci anyon view">

<p class="tab-intro" id="tabIntro">Where the golden ratio is genuinely load-bearing. <strong>Braiding:</strong> a Fibonacci anyon's quantum dimension is exactly φ, making it universal by braiding alone, with no magic-state distillation. Braid the worldlines and watch the fusion-space fidelity under real noise.</p>
<div class="frame-wrap">
  <div id="frames"><div class="frame-loading" id="loading">Loading…</div></div>
</div>

<script src="assets/demo-header.js?v=20260622"></script>
<script>
// Unified host: lazy same-origin iframes of the two standalone Fibonacci-anyon
// demos (loaded with ?embed=1 so each hides its own chrome).
(function () {
  var frames = document.getElementById('frames');
  var loading = document.getElementById('loading');
  var intro = document.getElementById('tabIntro');
  var made = {};
  var introByLabel = {
    'Braiding': 'Where the golden ratio is genuinely load-bearing. <strong>Braiding:</strong> a Fibonacci anyon\'s quantum dimension is exactly φ, making it universal by braiding alone, with no magic-state distillation. Braid the worldlines and watch the fusion-space fidelity under real noise.',
    'Modular data': '<strong>Modular data:</strong> the Fibonacci S/T matrices, S²=I, Verlinde recovering τ×τ=1+τ, and φ read straight off the S-matrix, with the honest twist that both Fibonacci and Ising have <em>consistent</em> modular data; what separates them is braiding universality, not consistency.'
  };

  function fit(f) {
    try { var d = f.contentDocument; if (d && d.body) f.style.height = (d.body.scrollHeight + 24) + 'px'; }
    catch (e) { /* ignore */ }
  }
  function applyTheme(f) {
    try {
      var dark = document.documentElement.getAttribute('data-theme') === 'dark';
      var doc = f.contentDocument, win = f.contentWindow;
      if (dark) doc.documentElement.setAttribute('data-theme', 'dark');
      else doc.documentElement.removeAttribute('data-theme');
      if (win && win.PhiTheme && win.PhiTheme._fire) win.PhiTheme._fire();
      setTimeout(function () { fit(f); }, 60);
    } catch (e) { /* ignore */ }
  }
  function show(src) {
    Object.keys(made).forEach(function (s) { made[s].style.display = (s === src) ? 'block' : 'none'; });
    if (!made[src]) {
      var f = document.createElement('iframe');
      f.className = 'demo-frame'; f.title = 'demo'; f.style.height = '900px';
      f.src = src + '?embed=1';
      f.addEventListener('load', function () { applyTheme(f); fit(f); });
      made[src] = f; frames.appendChild(f);
    }
    if (loading) loading.style.display = 'none';
  }
  document.querySelectorAll('#tabbar .tab').forEach(function (btn) {
    btn.addEventListener('click', function () {
      document.querySelectorAll('#tabbar .tab').forEach(function (b) {
        b.classList.toggle('active', b === btn);
        b.setAttribute('aria-selected', b === btn ? 'true' : 'false');
      });
      intro.innerHTML = introByLabel[btn.dataset.label] || '';
      show(btn.dataset.src);
    });
  });
  window.addEventListener('resize', function () {
    Object.keys(made).forEach(function (s) { if (made[s].style.display !== 'none') fit(made[s]); });
  });
  function onThemeChange() { Object.keys(made).forEach(function (s) { applyTheme(made[s]); }); }
  if (window.PhiTheme && window.PhiTheme.onChange) window.PhiTheme.onChange(onThemeChange);

  show('anyon-braiding.html');
})();
</script>
</body>
